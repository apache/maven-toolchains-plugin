# see https://s.apache.org/asfyaml
github:
  description: "Apache Maven Toolchains Plugin"
  homepage: https://maven.apache.org/plugins/maven-toolchains-plugin/
  labels:
    - java
    - build-management
    - maven-plugins
    - maven-toolchains-plugin
    - maven
  protected_branches:
    master: { }
  pull_requests:
    del_branch_on_merge: true
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: true
  autolink_jira:
    - MTOOLCHAINS
  features:
    issues: true
notifications:
  commits: commits@maven.apache.org
  issues: issues@maven.apache.org
  pullrequests: issues@maven.apache.org

# https://release-test.apache.org/projects/maven-toolchains-plugin see https://s.apache.org/asfyaml#project
project:
  metadata:
    key: maven-toolchains-plugin
    committee: maven
    name: Apache Maven Toolchains Plugin
    description: The Toolchains Plugins allows to share configuration across plugins. For example to make sure the plugins like compiler, surefire, javadoc, webstart etc. all use the same JDK for execution.
    short_description: Apache Maven plugin for sharing toolchain configuration across plugins.
    homepage: https://maven.apache.org/plugins/maven-toolchains-plugin
    download_page: https://maven.apache.org/plugins/maven-toolchains-plugin/download.cgi
    bug_database: https://maven.apache.org/plugins/maven-toolchains-plugin/issue-management.html
    mailing_lists: https://maven.apache.org/plugins/maven-toolchains-plugin/mailing-lists.html
    repositories:
      - https://github.com/apache/maven-toolchains-plugin.git
    categories:
      - build-management
    programming_languages:
      - Java
  policy:
    github_repository_name: maven-toolchains-plugin
    download_path_suffix: plugins
  features:
    atr_sync: true
